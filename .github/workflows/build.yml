name: Build and Release Visible

on:
  push:
    tags:
      - 'v*' # Triggers on tags like v1.0.0, v0.1.0, etc.

jobs:
  release:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        # Running macOS and Linux builds in parallel
        os: [macos-latest, ubuntu-latest]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build and Publish
        run: |
          if [ "${{ matrix.os }}" = "macos-latest" ]; then
            # Runs: transpile -> build -> electron-builder --mac
            npm run dist:mac -- --publish always
          else
            # Runs: transpile -> build -> electron-builder --linux
            npm run dist:linux -- --publish always
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}